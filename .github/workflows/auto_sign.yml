name: Daily Auto Sign-in

# 触发条件
on:
  schedule:
    # 每天 UTC 时间 00:00 执行（对应北京/台北时间上午 8:00）
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许在 GitHub 网页端手动点击按钮触发运行，方便测试

jobs:
  run-sign-script:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 设置 Python 环境
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # ddddocr 在 3.10 兼容性较好

      # 3. 安装依赖库
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # 4. 执行签到脚本
      - name: Run Sign Script
        env:
          MY_EMAIL: ${{ secrets.MY_EMAIL }}       # 从 GitHub Secrets 读取邮箱
          MY_PASSWORD: ${{ secrets.MY_PASSWORD }} # 从 GitHub Secrets 读取密码
          EMAIL_PASS: ${{ secrets.EMAIL_PASS }}
          RECEIVE_EMAIL: ${{ secrets.RECEIVE_EMAIL }}
        run: |
          python main.py
